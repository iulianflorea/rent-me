<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-header">
      <h1 class="brand">RentIt</h1>
      <h2>{{ 'auth.register.title' | translate }}</h2>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row-2">
        <div class="form-group">
          <label class="form-label">{{ 'auth.register.firstName' | translate }}</label>
          <input type="text" formControlName="firstName" class="form-control" autocomplete="given-name" />
        </div>
        <div class="form-group">
          <label class="form-label">{{ 'auth.register.lastName' | translate }}</label>
          <input type="text" formControlName="lastName" class="form-control" autocomplete="family-name" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'auth.register.email' | translate }}</label>
        <input type="email" formControlName="email" class="form-control" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'auth.register.phone' | translate }}</label>
        <input type="tel" formControlName="phone" class="form-control" autocomplete="tel" />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'auth.register.password' | translate }}</label>
        <input type="password" formControlName="password" class="form-control" autocomplete="new-password" />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'auth.register.confirmPassword' | translate }}</label>
        <input type="password" formControlName="confirmPassword" class="form-control" autocomplete="new-password" />
      </div>

      <p class="terms text-xs text-secondary">{{ 'auth.register.terms' | translate }}</p>

      <button type="submit" class="btn btn-primary w-full" [disabled]="form.invalid || loading">
        @if (loading) {
          <span class="spinner"></span>
        } @else {
          {{ 'auth.register.submit' | translate }}
        }
      </button>
    </form>

    <p class="auth-footer text-center text-secondary text-sm">
      {{ 'auth.register.hasAccount' | translate }}
      <a routerLink="/auth/login">{{ 'nav.login' | translate }}</a>
    </p>
  </div>
</div>

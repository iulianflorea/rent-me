<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-header">
      <h1 class="brand">RentIt</h1>
      <h2>{{ 'auth.login.title' | translate }}</h2>
      <p class="text-secondary">{{ 'auth.login.subtitle' | translate }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">{{ 'auth.login.email' | translate }}</label>
        <input
          type="email"
          formControlName="email"
          class="form-control"
          [class.error]="form.get('email')?.invalid && form.get('email')?.touched"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'auth.login.password' | translate }}</label>
        <input
          type="password"
          formControlName="password"
          class="form-control"
          [class.error]="form.get('password')?.invalid && form.get('password')?.touched"
          autocomplete="current-password"
        />
      </div>

      <div class="forgot-link">
        <a routerLink="/auth/forgot-password">{{ 'auth.login.forgot' | translate }}</a>
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="form.invalid || loading">
        @if (loading) {
          <span class="spinner"></span>
        } @else {
          {{ 'auth.login.submit' | translate }}
        }
      </button>
    </form>

    <p class="auth-footer text-center text-secondary text-sm">
      {{ 'auth.login.noAccount' | translate }}
      <a routerLink="/auth/register">{{ 'nav.register' | translate }}</a>
    </p>
  </div>
</div>

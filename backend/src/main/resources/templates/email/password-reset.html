<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background-color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f7;padding:40px 20px;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
        <tr>
          <td style="background-color:#4f46e5;padding:32px 40px;border-radius:16px 16px 0 0;text-align:center;">
            <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:700;">RentIt</h1>
          </td>
        </tr>
        <tr>
          <td style="background-color:#ffffff;padding:40px;border-radius:0 0 16px 16px;">
            <h2 style="margin:0 0 16px;color:#1d1d1f;font-size:24px;font-weight:600;">Resetare parolă</h2>
            <p style="margin:0 0 24px;color:#6e6e73;font-size:16px;line-height:1.6;">
              Bună, <span th:text="${user.firstName}">Utilizator</span>! Ai solicitat resetarea parolei.
              Apasă butonul de mai jos pentru a seta o parolă nouă.
            </p>
            <table width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 32px;">
              <tr>
                <td align="center">
                  <a th:href="${resetUrl}" style="display:inline-block;background-color:#4f46e5;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:600;">
                    Resetează parola
                  </a>
                </td>
              </tr>
            </table>
            <p style="margin:0 0 24px;color:#6e6e73;font-size:14px;line-height:1.6;text-align:center;">
              Acest link expiră în <strong>1 oră</strong>. Dacă nu ai solicitat resetarea parolei, ignoră acest email.
            </p>
            <hr style="border:none;border-top:1px solid #e8e8ed;margin:32px 0;">
            <p style="margin:0;color:#6e6e73;font-size:12px;text-align:center;">RentIt SRL · <a href="mailto:support@rentit.ro" style="color:#4f46e5;">support@rentit.ro</a></p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>

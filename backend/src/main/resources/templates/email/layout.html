<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f7;padding:40px 20px;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
        <!-- Header -->
        <tr>
          <td style="background-color:#4f46e5;padding:32px 40px;border-radius:16px 16px 0 0;text-align:center;">
            <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:700;letter-spacing:-0.5px;">RentIt</h1>
            <p style="margin:8px 0 0;color:rgba(255,255,255,0.8);font-size:14px;">Platformă de Închirieri</p>
          </td>
        </tr>
        <!-- Content -->
        <tr>
          <td style="background-color:#ffffff;padding:40px;border-radius:0 0 16px 16px;">
            <div th:replace="${content}">
              <!-- email content goes here -->
            </div>
            <!-- Footer -->
            <hr style="border:none;border-top:1px solid #e8e8ed;margin:32px 0;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td style="color:#6e6e73;font-size:12px;line-height:1.6;">
                  <p style="margin:0 0 4px;">RentIt SRL · București, România</p>
                  <p style="margin:0 0 4px;">DPO: <a href="mailto:dpo@rentit.ro" style="color:#4f46e5;text-decoration:none;">dpo@rentit.ro</a></p>
                  <p style="margin:0;">Dacă nu dorești să mai primești emailuri de la noi, <a href="#" style="color:#4f46e5;text-decoration:none;">dezabonează-te</a>.</p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>

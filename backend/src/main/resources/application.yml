spring:
  application:
    name: rentit

  datasource:
    url: jdbc:mysql://localhost:3306/rentme?useSSL=false&serverTimezone=Europe/Bucharest&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:rgbiuli1}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_schema: rentme

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.zoho.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    check-template-location: true
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForRentItApplicationThatMustBeAtLeast256BitsLong1234567890}
    expiration: 2592000000
    refresh-expiration: 2592000000
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  admin:
    email: ${ADMIN_EMAIL:admin@singularity-cloud.com}
    password: ${ADMIN_PASSWORD:rgbiuli1}
  aes:
    secret: ${AES_SECRET:RentItAES256Key!}

stripe:
  api-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  platform-fee-percent: 5

storage:
  mode: ${STORAGE_MODE:local}
  upload-dir: ${STORAGE_UPLOAD_DIR:./uploads}
  base-url: ${STORAGE_BASE_URL:http://localhost:8080}
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  bucket: ${STORAGE_BUCKET:rentit-files}
  region: ${STORAGE_REGION:us-east-1}

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.singularity.rentit: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
